<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Task | Professional Workspace</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --sidebar-bg: #111827;
            --sidebar-text: #9ca3af;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-dark: #1f2937;
            --text-muted: #6b7280;
            --border: #e5e7eb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            display: flex;
            background-color: var(--bg-color);
            min-height: 100vh;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            color: white;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
        }

        .logo {
            padding: 24px;
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #374151;
            letter-spacing: 0.5px;
        }

        .nav-menu {
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .nav-item {
            padding: 15px 24px;
            color: var(--sidebar-text);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .nav-item:hover, .nav-item.active {
            background-color: #1f2937;
            color: white;
            border-left: 4px solid var(--primary);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 40px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: var(--text-dark);
            font-size: 28px;
        }

        /* View Sections */
        .view-section {
            display: none;
            animation: fadeIn 0.4s ease-in-out;
        }

        .view-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Dashboard Grid (Tasks) */
        .tasks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .task-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border);
            transition: transform 0.2s ease;
        }

        .task-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .task-status {
            background: #dbeafe;
            color: #1e40af;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .task-date {
            color: var(--text-muted);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .task-title {
            color: var(--text-dark);
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .task-desc {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .task-links a {
            display: inline-block;
            background: #f3f4f6;
            color: var(--primary);
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-right: 8px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .task-image {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            margin-top: 10px;
        }

        /* Form UI */
        .form-container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            max-width: 800px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group { margin-bottom: 24px; }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-dark);
            font-weight: 500;
            font-size: 14px;
        }

        input[type="text"], input[type="date"], input[type="time"], textarea, input[type="file"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            background: #f9fafb;
            transition: all 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        textarea { height: 120px; resize: vertical; }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover { background-color: var(--primary-hover); }
        .btn-outline { background-color: transparent; border: 1px solid var(--border); color: var(--text-dark); }
        .btn-outline:hover { background-color: #f3f4f6; }

        .links-wrapper {
            background: #f9fafb;
            padding: 20px;
            border-radius: 8px;
            border: 1px dashed var(--border);
        }

        .link-input-group { margin-bottom: 10px; }

        .loader {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 18px;
        }

        #statusMsg {
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">
            <i class="fas fa-layer-group"></i> Lumina Task
        </div>
        <div class="nav-menu">
            <div class="nav-item active" onclick="switchView('dashboard')">
                <i class="fas fa-chart-pie"></i> Tablero de Tareas
            </div>
            <div class="nav-item" onclick="switchView('newTask')">
                <i class="fas fa-plus-circle"></i> Nueva Actividad
            </div>
        </div>
    </div>

    <div class="main-content">
        
        <div id="dashboard" class="view-section active">
            <div class="header">
                <h1>Resumen de Actividades</h1>
                <button class="btn" onclick="switchView('newTask')"><i class="fas fa-plus"></i> Crear Tarea</button>
            </div>
            
            <div id="loadingTasks" class="loader">
                <i class="fas fa-spinner fa-spin"></i> Sincronizando sistema...
            </div>
            
            <div class="tasks-grid" id="tasksContainer">
                </div>
        </div>

        <div id="newTask" class="view-section">
            <div class="header">
                <h1>Programar Nueva Actividad</h1>
            </div>

            <div class="form-container">
                <form id="systemForm">
                    <div class="form-group">
                        <label>Título de la Actividad</label>
                        <input type="text" id="title" placeholder="Ej. Desarrollar módulo de descargas..." required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Fecha Asignada</label>
                            <input type="date" id="date" required>
                        </div>
                        <div class="form-group">
                            <label>Hora (Opcional)</label>
                            <input type="time" id="time">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Descripción y Notas</label>
                        <textarea id="description" placeholder="Escribe la lógica del sistema, puntos clave o el progreso..." required></textarea>
                    </div>

                    <div class="form-group links-wrapper">
                        <label><i class="fas fa-link"></i> Recursos y Enlaces</label>
                        <div id="linksList">
                            <div class="link-input-group">
                                <input type="text" class="link-item" placeholder="https://ejemplo.com">
                            </div>
                        </div>
                        <button type="button" class="btn btn-outline" style="margin-top: 10px;" onclick="addLinkField()">
                            <i class="fas fa-plus"></i> Añadir enlace
                        </button>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-image"></i> Material Visual (Opcional)</label>
                        <input type="file" id="image" accept="image/*">
                    </div>

                    <button type="submit" class="btn" id="submitBtn" style="width: 100%; justify-content: center; margin-top: 10px;">
                        <i class="fas fa-save"></i> Guardar en el Sistema
                    </button>
                    <div id="statusMsg"></div>
                </form>
            </div>
        </div>

    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwBNYAY0h6NdIS3SvJZwJw-VRNmL1jdGvTl6zXHrTcOEhwOlDNajo4oKjyG7lFM4UKi/exec';

        // Cambiar entre vistas
        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            
            document.getElementById(viewId).classList.add('active');
            
            if(viewId === 'dashboard') {
                document.querySelectorAll('.nav-item')[0].classList.add('active');
                loadTasks(); // Recargar tareas al entrar al tablero
            } else {
                document.querySelectorAll('.nav-item')[1].classList.add('active');
            }
        }

        // Agregar campos de links
        function addLinkField() {
            const div = document.createElement('div');
            div.className = 'link-input-group';
            div.innerHTML = '<input type="text" class="link-item" placeholder="https://ejemplo.com">';
            document.getElementById('linksList').appendChild(div);
        }

        // Cargar las tareas desde Google Sheets
        async function loadTasks() {
            const container = document.getElementById('tasksContainer');
            const loader = document.getElementById('loadingTasks');
            
            container.innerHTML = '';
            loader.style.display = 'block';

            try {
                const response = await fetch(APPS_SCRIPT_URL);
                const result = await response.json();
                
                loader.style.display = 'none';

                if (result.status === 'success' && result.data) {
                    // Invertir el array para ver las más recientes primero
                    const tasks = result.data.reverse();
                    
                    if(tasks.length === 0) {
                        container.innerHTML = '<p style="color:var(--text-muted); grid-column: 1/-1;">No hay tareas programadas aún.</p>';
                        return;
                    }

                    tasks.forEach(task => {
                        let linksHtml = '';
                        if(task.links && task.links !== "") {
                            const linksArray = task.links.split(' | ');
                            linksArray.forEach((link, index) => {
                                if(link.trim() !== "") {
                                    linksHtml += `<a href="${link}" target="_blank"><i class="fas fa-external-link-alt"></i> Link ${index + 1}</a>`;
                                }
                            });
                        }

                        let imageHtml = '';
                        if(task.image && task.image !== "") {
                            imageHtml = `<img src="${task.image}" class="task-image" alt="Referencia visual">`;
                        }

                        // Formatear la fecha para que se vea profesional
                        const dateObj = new Date(task.date);
                        const formattedDate = !isNaN(dateObj) ? dateObj.toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }) : task.date;

                        const card = document.createElement('div');
                        card.className = 'task-card';
                        card.innerHTML = `
                            <div class="task-header">
                                <span class="task-date"><i class="far fa-calendar-alt"></i> ${formattedDate} ${task.time ? '- ' + task.time : ''}</span>
                                <span class="task-status">${task.status || 'Pendiente'}</span>
                            </div>
                            <div class="task-title">${task.title}</div>
                            <div class="task-desc">${task.description}</div>
                            <div class="task-links">${linksHtml}</div>
                            ${imageHtml}
                        `;
                        container.appendChild(card);
                    });
                }
            } catch (error) {
                loader.style.display = 'none';
                container.innerHTML = '<p style="color:red; grid-column: 1/-1;">Error al sincronizar con el servidor.</p>';
            }
        }

        // Enviar formulario (Guardar nueva tarea)
        document.getElementById('systemForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const statusMsg = document.getElementById('statusMsg');
            const btn = document.getElementById('submitBtn');
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Procesando...';
            btn.disabled = true;

            const links = Array.from(document.querySelectorAll('.link-item'))
                               .map(input => input.value.trim())
                               .filter(val => val !== '');

            const imageFile = document.getElementById('image').files[0];
            let base64Image = null, imageName = null;

            if (imageFile) {
                base64Image = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(imageFile);
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = error => reject(error);
                });
                imageName = imageFile.name;
            }

            const payload = {
                title: document.getElementById('title').value,
                date: document.getElementById('date').value,
                time: document.getElementById('time').value,
                description: document.getElementById('description').value,
                links: links,
                imageFile: base64Image,
                imageName: imageName
            };

            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                
                if(result.status === 'success') {
                    statusMsg.style.display = 'block';
                    statusMsg.style.backgroundColor = '#dcfce7';
                    statusMsg.style.color = '#166534';
                    statusMsg.innerHTML = '<i class="fas fa-check-circle"></i> ¡Guardado con éxito!';
                    document.getElementById('systemForm').reset();
                    document.getElementById('linksList').innerHTML = '<div class="link-input-group"><input type="text" class="link-item" placeholder="https://ejemplo.com"></div>';
                    
                    // A los 2 segundos, volver al tablero para ver la nueva tarea
                    setTimeout(() => {
                        statusMsg.style.display = 'none';
                        switchView('dashboard');
                    }, 2000);
                }
            } catch (error) {
                statusMsg.style.display = 'block';
                statusMsg.style.backgroundColor = '#fee2e2';
                statusMsg.style.color = '#991b1b';
                statusMsg.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Error de conexión.';
            } finally {
                btn.innerHTML = '<i class="fas fa-save"></i> Guardar en el Sistema';
                btn.disabled = false;
            }
        });

        // Cargar las tareas al iniciar la página
        window.onload = loadTasks;
    </script>
</body>
</html>
