<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SysControl Hub | Cuartel General</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌌</text></svg>">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-main: #0b1120;
            --bg-panel: #1e293b;
            --bg-card: #0f172a;
            --accent: #38bdf8;
            --accent-hover: #0284c7;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            
            /* Colores de Estado */
            --status-active: #10b981;
            --status-dev: #f59e0b;
            --status-paused: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Navbar superior */
        .navbar {
            width: 100%;
            background-color: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand i { color: var(--accent); }

        .nav-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .search-box {
            position: relative;
        }

        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-input {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 15px 10px 40px;
            border-radius: 20px;
            width: 300px;
            outline: none;
            transition: 0.3s;
        }

        .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(56,189,248,0.1); }

        .btn-add {
            background-color: var(--accent);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-add:hover { background-color: var(--accent-hover); transform: translateY(-2px); }

        /* Contenedor Principal */
        .container {
            width: 100%;
            max-width: 1200px;
            padding: 40px 20px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 30px;
            color: var(--text-main);
        }

        /* Grid de Tarjetas */
        .hub-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .app-card {
            background-color: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 25px;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .app-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .card-header {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            margin-bottom: 15px;
        }

        .app-icon {
            width: 50px;
            height: 50px;
            background: rgba(56,189,248,0.1);
            color: var(--accent);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .app-info { flex-grow: 1; }

        .app-title { font-size: 18px; font-weight: 600; color: var(--text-main); margin-bottom: 5px; }

        .app-category {
            font-size: 12px;
            color: var(--text-muted);
            background: var(--bg-card);
            padding: 3px 8px;
            border-radius: 6px;
            display: inline-block;
        }

        .app-desc {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 25px;
            flex-grow: 1;
        }

        .status-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
        }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
        .status-Activo { background-color: var(--status-active); box-shadow: 0 0 8px var(--status-active); }
        .status-Desarrollo { background-color: var(--status-dev); box-shadow: 0 0 8px var(--status-dev); }
        .status-Pausado { background-color: var(--status-paused); box-shadow: 0 0 8px var(--status-paused); }

        .btn-launch {
            width: 100%;
            background-color: var(--bg-card);
            color: var(--accent);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-launch:hover { background-color: var(--accent); color: #fff; border-color: var(--accent); }

        /* Modal (Ventana Flotante) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }

        .modal-overlay.active { display: flex; }

        .modal-content {
            background-color: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .modal-header h2 { font-size: 20px; color: var(--text-main); }
        .btn-close { background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; }
        .btn-close:hover { color: #ef4444; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--text-muted); font-weight: 500; }
        
        .form-control {
            width: 100%; padding: 12px;
            background-color: var(--bg-main); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text-main); outline: none; transition: 0.3s;
        }
        .form-control:focus { border-color: var(--accent); }

        .btn-submit {
            width: 100%; padding: 14px; background-color: var(--accent);
            color: #fff; border: none; border-radius: 8px; font-size: 15px;
            font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-submit:hover { background-color: var(--accent-hover); }

        .loader { text-align: center; color: var(--text-muted); padding: 40px; width: 100%; }
        
        /* Notificaciones */
        .toast {
            position: fixed; bottom: 30px; right: 30px;
            background: var(--bg-panel); border-left: 4px solid var(--status-active);
            padding: 15px 25px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex; align-items: center; gap: 10px;
            transform: translateX(150%); transition: 0.3s; z-index: 1001;
        }
        .toast.show { transform: translateX(0); }
        .toast.error { border-left-color: #ef4444; }

        @media (max-width: 768px) {
            .navbar { flex-direction: column; gap: 15px; padding: 15px 20px; }
            .search-input { width: 100%; }
            .nav-controls { width: 100%; flex-direction: column; }
            .btn-add { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="brand">
            <i class="fa-solid fa-network-wired"></i> SysControl Hub
        </div>
        <div class="nav-controls">
            <div class="search-box">
                <i class="fa-solid fa-search"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="Buscar sistema..." onkeyup="filtrarSistemas()">
            </div>
            <button class="btn-add" onclick="abrirModal()"><i class="fa-solid fa-plus"></i> Registrar Sistema</button>
        </div>
    </nav>

    <div class="container">
        <h2 class="section-title">Mis Herramientas Activas</h2>
        <div id="loader" class="loader"><i class="fa-solid fa-circle-notch fa-spin"></i> Conectando con la base de datos...</div>
        <div class="hub-grid" id="hubGrid"></div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fa-solid fa-link"></i> Registrar Nuevo Sistema</h2>
                <button class="btn-close" onclick="cerrarModal()"><i class="fa-solid fa-times"></i></button>
            </div>
            
            <div class="form-group">
                <label>Nombre del Sistema</label>
                <input type="text" id="inNombre" class="form-control" placeholder="Ej: VoxAdmin Pro">
            </div>
            <div class="form-group">
                <label>Descripción Breve</label>
                <input type="text" id="inDesc" class="form-control" placeholder="¿Qué función cumple?">
            </div>
            <div class="form-group">
                <label>Enlace URL</label>
                <input type="url" id="inLink" class="form-control" placeholder="https://...">
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>Categoría</label>
                    <select id="inCat" class="form-control">
                        <option value="Inteligencia Artificial">IA & Voz</option>
                        <option value="Base de Datos">Base de Datos</option>
                        <option value="Desarrollo">Desarrollo/Código</option>
                        <option value="Bot">Bots / Terminal</option>
                        <option value="Utilidad">Utilidad Web</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Estado</label>
                    <select id="inEstado" class="form-control">
                        <option value="Activo">🟢 Activo</option>
                        <option value="Desarrollo">🟡 En Desarrollo</option>
                        <option value="Pausado">🔴 Pausado</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Icono (FontAwesome)</label>
                <select id="inIcono" class="form-control">
                    <option value="fa-microphone">🎙️ Micrófono</option>
                    <option value="fa-code">💻 Código</option>
                    <option value="fa-database">🗄️ Base de Datos</option>
                    <option value="fa-robot">🤖 Robot / Bot</option>
                    <option value="fa-link">🔗 Enlace</option>
                    <option value="fa-bolt">⚡ Energía / Rápido</option>
                </select>
            </div>

            <button class="btn-submit" id="btnGuardar" onclick="guardarSistema()">Guardar y Conectar</button>
        </div>
    </div>

    <div class="toast" id="toastMsg">
        <i class="fa-solid fa-circle-check" id="toastIcon"></i>
        <span id="toastText">Acción completada</span>
    </div>

    <script>
        // Enlace restaurado a tu Google Apps Script
        const API_URL = "https://script.google.com/macros/s/AKfycbwwr_Iz5VcBMyg755MrXBPI9fcga1Ck9U7L34LNZ9Q9RbT-QCNll8SESgGmo_HQ8NTMOA/exec";
        
        let sistemasGlobales = [];

        function abrirModal() { document.getElementById('modalOverlay').classList.add('active'); }
        function cerrarModal() { 
            document.getElementById('modalOverlay').classList.remove('active'); 
            limpiarFormulario();
        }

        function cargarSistemas() {
            const grid = document.getElementById('hubGrid');
            const loader = document.getElementById('loader');
            
            grid.innerHTML = '';
            loader.style.display = 'block';

            fetch(API_URL)
            .then(res => res.json())
            .then(data => {
                loader.style.display = 'none';
                sistemasGlobales = data || [];
                renderizarTarjetas(sistemasGlobales);
            })
            .catch(() => {
                loader.style.display = 'none';
                grid.innerHTML = '<p style="text-align:center; color:#ef4444; width:100%; grid-column: 1/-1;">Error al conectar con el Cuartel General.</p>';
            });
        }

        function renderizarTarjetas(datos) {
            const grid = document.getElementById('hubGrid');
            grid.innerHTML = '';

            if (datos.length === 0) {
                grid.innerHTML = '<p style="text-align:center; color:var(--text-muted); width:100%; grid-column: 1/-1;">No tienes sistemas registrados. Añade el primero.</p>';
                return;
            }

            datos.forEach(item => {
                let estadoLimpio = item.estado.replace(/[^a-zA-Z]/g, '').trim(); 
                
                const card = document.createElement('div');
                card.className = 'app-card';
                card.innerHTML = `
                    <div class="status-indicator">
                        <div class="status-dot status-${estadoLimpio}"></div> ${estadoLimpio}
                    </div>
                    <div class="card-header">
                        <div class="app-icon"><i class="fa-solid ${item.icono}"></i></div>
                        <div class="app-info">
                            <h3 class="app-title">${item.sistema}</h3>
                            <span class="app-category">${item.categoria}</span>
                        </div>
                    </div>
                    <p class="app-desc">${item.descripcion}</p>
                    <a href="${item.link}" target="_blank" class="btn-launch"><i class="fa-solid fa-rocket"></i> Abrir Sistema</a>
                `;
                grid.appendChild(card);
            });
        }

        function filtrarSistemas() {
            const texto = document.getElementById('searchInput').value.toLowerCase();
            const filtrados = sistemasGlobales.filter(item => 
                (item.sistema && item.sistema.toLowerCase().includes(texto)) || 
                (item.descripcion && item.descripcion.toLowerCase().includes(texto)) ||
                (item.categoria && item.categoria.toLowerCase().includes(texto))
            );
            renderizarTarjetas(filtrados);
        }

        function guardarSistema() {
            const nombre = document.getElementById('inNombre').value.trim();
            const link = document.getElementById('inLink').value.trim();
            
            if (!nombre || !link) {
                mostrarToast("El nombre y el enlace son obligatorios", "error");
                return;
            }

            const btnSave = document.getElementById('btnGuardar');
            btnSave.disabled = true;
            btnSave.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Conectando...';

            const payload = {
                sistema: nombre,
                descripcion: document.getElementById('inDesc').value,
                link: link,
                categoria: document.getElementById('inCat').value,
                estado: document.getElementById('inEstado').value,
                icono: document.getElementById('inIcono').value
            };

            // Estructura de guardado idéntica a los sistemas anteriores que funcionan a la perfección
            fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                btnSave.disabled = false;
                btnSave.innerHTML = 'Guardar y Conectar';
                
                if(data.status === "exito") {
                    mostrarToast("Sistema registrado en el Cuartel General");
                    cerrarModal();
                    cargarSistemas();
                } else {
                    throw new Error("Error del servidor");
                }
            })
            .catch(() => {
                btnSave.disabled = false;
                btnSave.innerHTML = 'Guardar y Conectar';
                mostrarToast("Error de red", "error");
            });
        }

        function limpiarFormulario() {
            document.getElementById('inNombre').value = '';
            document.getElementById('inDesc').value = '';
            document.getElementById('inLink').value = '';
        }

        function mostrarToast(mensaje, tipo = 'success') {
            const toast = document.getElementById('toastMsg');
            document.getElementById('toastText').innerText = mensaje;
            const icon = document.getElementById('toastIcon');
            
            if (tipo === 'success') {
                toast.classList.remove('error');
                icon.className = 'fa-solid fa-circle-check';
                icon.style.color = 'var(--status-active)';
            } else {
                toast.classList.add('error');
                icon.className = 'fa-solid fa-triangle-exclamation';
                icon.style.color = '#ef4444';
            }

            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        window.onload = cargarSistemas;
    </script>
</body>
</html>
