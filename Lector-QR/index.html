<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lector QR Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --success-hover: #059669;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        header {
            text-align: center;
            margin-top: 20px;
        }

        header h1 {
            font-size: 2.2rem;
            color: var(--primary);
            margin-bottom: 5px;
        }

        header p {
            color: var(--text-muted);
        }

        /* Zona de Carga */
        .upload-section {
            background-color: var(--card-bg);
            border: 2px dashed var(--border);
            border-radius: 15px;
            padding: 40px 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .upload-section:hover {
            border-color: var(--primary);
            background-color: #1e293bcf;
        }

        .upload-label {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        .upload-label i {
            font-size: 3rem;
            color: var(--primary);
        }

        /* Tarjeta de Resultado */
        .result-section {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .result-section h3 {
            margin-bottom: 15px;
            color: var(--text-muted);
        }

        .result-box {
            background-color: var(--bg-color);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
            word-break: break-all;
            font-size: 1.1rem;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 120px;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: white;
            transition: background-color 0.2s;
        }

        .btn-primary { background-color: var(--primary); }
        .btn-primary:hover { background-color: var(--primary-hover); }

        .btn-success { background-color: var(--success); }
        .btn-success:hover { background-color: var(--success-hover); }

        .btn-danger { background-color: var(--danger); }
        .btn-danger:hover { background-color: var(--danger-hover); }

        .hidden { display: none !important; }

        .status-msg {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            min-height: 20px;
        }

        /* Historial */
        .history-section {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn-icon {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .btn-icon:hover { color: var(--primary); }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            color: var(--text-muted);
            font-weight: 600;
        }

        tbody tr:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .btn-delete {
            background-color: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-delete:hover {
            background-color: var(--danger);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fa-solid fa-qrcode"></i> Escáner QR Pro</h1>
            <p>Sube una imagen y extrae la información al instante.</p>
        </header>

        <section class="upload-section" id="drop-zone">
            <input type="file" id="file-input" accept="image/*" hidden>
            <label for="file-input" class="upload-label">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                <span>Haz clic o arrastra la imagen del QR aquí</span>
            </label>
            <canvas id="canvas" hidden></canvas>
        </section>

        <section class="result-section hidden" id="result-card">
            <h3>Resultado del Escaneo:</h3>
            <div class="result-box">
                <p id="qr-result-text">Cargando...</p>
            </div>
            <div class="action-buttons">
                <button id="btn-copy" class="btn btn-primary"><i class="fa-solid fa-copy"></i> Copiar</button>
                <button id="btn-save" class="btn btn-success"><i class="fa-solid fa-floppy-disk"></i> Guardar</button>
                <button id="btn-clear" class="btn btn-danger"><i class="fa-solid fa-trash-can"></i> Limpiar</button>
            </div>
            <p id="status-msg" class="status-msg"></p>
        </section>

        <section class="history-section">
            <div class="history-header">
                <h2><i class="fa-solid fa-clock-rotate-left"></i> Historial Guardado</h2>
                <button id="btn-refresh" class="btn-icon" title="Actualizar Historial"><i class="fa-solid fa-rotate-right"></i></button>
            </div>
            <div class="table-container">
                <table id="history-table">
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Contenido Extraído</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="history-body">
                        <tr><td colspan="3">Cargando historial...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        // URL de tu API de Google Apps Script (Ya integrada)
        const API_URL = "https://script.google.com/macros/s/AKfycbxS5JK77gh5kC04OHZKSfC0My4_Brj5Lob7HRlG1iqImAY_AJe3QQCqK-YN7C387op6/exec";

        const fileInput = document.getElementById('file-input');
        const canvasElement = document.getElementById('canvas');
        const canvas = canvasElement.getContext('2d', { willReadFrequently: true });
        const resultCard = document.getElementById('result-card');
        const qrResultText = document.getElementById('qr-result-text');
        const statusMsg = document.getElementById('status-msg');
        const historyBody = document.getElementById('history-body');

        let currentScanResult = "";

        // 1. EVENTO: Cargar Imagen y Escanear
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    canvasElement.width = img.width;
                    canvasElement.height = img.height;
                    canvas.drawImage(img, 0, 0, canvasElement.width, canvasElement.height);
                    
                    const imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
                    const code = jsQR(imageData.data, imageData.width, imageData.height, {
                        inversionAttempts: "dontInvert",
                    });

                    if (code) {
                        currentScanResult = code.data;
                        qrResultText.textContent = currentScanResult;
                        resultCard.classList.remove('hidden');
                        showMessage("¡Código detectado con éxito!", "var(--success)");
                    } else {
                        alert("No se detectó ningún código QR. Intenta con una imagen más clara.");
                        clearUI();
                    }
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // 2. BOTÓN: Copiar
        document.getElementById('btn-copy').addEventListener('click', () => {
            navigator.clipboard.writeText(currentScanResult).then(() => {
                showMessage("¡Copiado al portapapeles!", "var(--primary)");
            }).catch(err => {
                showMessage("Error al copiar", "var(--danger)");
            });
        });

        // 3. BOTÓN: Guardar en Sheets
        document.getElementById('btn-save').addEventListener('click', () => {
            if (!currentScanResult) return;
            
            showMessage("Guardando...", "var(--text-muted)");
            document.getElementById('btn-save').disabled = true;

            fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'save',
                    contenido: currentScanResult
                })
            })
            .then(response => response.json())
            .then(data => {
                if(data.status === 'success') {
                    showMessage("¡Guardado exitosamente!", "var(--success)");
                    loadHistory();
                } else {
                    showMessage("Error al guardar", "var(--danger)");
                }
            })
            .catch(error => showMessage("Error de conexión", "var(--danger)"))
            .finally(() => document.getElementById('btn-save').disabled = false);
        });

        // 4. BOTÓN: Limpiar
        document.getElementById('btn-clear').addEventListener('click', clearUI);

        function clearUI() {
            fileInput.value = "";
            currentScanResult = "";
            resultCard.classList.add('hidden');
            statusMsg.textContent = "";
        }

        function showMessage(msg, color) {
            statusMsg.textContent = msg;
            statusMsg.style.color = color;
            setTimeout(() => statusMsg.textContent = "", 4000);
        }

        // 5. HISTORIAL: Cargar datos
        function loadHistory() {
            historyBody.innerHTML = '<tr><td colspan="3" style="text-align:center;">Cargando historial...</td></tr>';
            
            fetch(API_URL)
            .then(response => response.json())
            .then(data => {
                historyBody.innerHTML = "";
                
                if (data.length === 0) {
                    historyBody.innerHTML = '<tr><td colspan="3" style="text-align:center;">No hay códigos guardados aún.</td></tr>';
                    return;
                }

                data.forEach(item => {
                    const tr = document.createElement('tr');
                    
                    let contentHTML = item.contenido;
                    if (contentHTML.startsWith('http://') || contentHTML.startsWith('https://')) {
                        contentHTML = `<a href="${contentHTML}" target="_blank" style="color:var(--primary); text-decoration:none;">${contentHTML}</a>`;
                    }

                    tr.innerHTML = `
                        <td>${item.fecha}</td>
                        <td style="word-break: break-all;">${contentHTML}</td>
                        <td>
                            <button class="btn-delete" onclick="deleteRecord('${item.id}')">
                                <i class="fa-solid fa-trash"></i> Eliminar
                            </button>
                        </td>
                    `;
                    historyBody.appendChild(tr);
                });
            })
            .catch(error => {
                historyBody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:var(--danger);">Error al cargar el historial.</td></tr>';
            });
        }

        // 6. HISTORIAL: Eliminar
        window.deleteRecord = function(id) {
            if (!confirm("¿Estás seguro de eliminar este registro?")) return;

            fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'delete',
                    id: id
                })
            })
            .then(response => response.json())
            .then(data => {
                if(data.status === 'success') {
                    loadHistory();
                } else {
                    alert("Hubo un error al eliminar.");
                }
            })
            .catch(error => alert("Error de conexión al eliminar."));
        };

        document.getElementById('btn-refresh').addEventListener('click', loadHistory);
        window.onload = loadHistory;
    </script>
</body>
</html>
