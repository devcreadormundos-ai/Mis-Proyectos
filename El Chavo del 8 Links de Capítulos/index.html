            margin: 0;
            padding: 0;
            min-height: 100vh;

            padding: 30px;
            margin-bottom: 40px;
            text-align: center;

            font-weight: 800;

            color: transparent;
            background-clip: text;
            -webkit-background-clip: text;

        }

        .search-wrapper {
            position: relative;
            max-width: 700px;
            margin: 0 auto;
        }

        .search-box {
            width: 100%;
            padding: 18px 25px 18px 50px;
            font-size: 1.1rem;
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid var(--glass-border);
            border-radius: 50px;
            color: var(--text-main);
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .search-box:focus {

            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.2);
            background: rgba(0, 0, 0, 0.4);

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            fill: var(--text-muted);
            transition: fill 0.3s ease;
        }

        .search-box:focus + .search-icon {
            fill: var(--accent);
        }

        .stats {
            margin-top: 15px;
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* === GRILLA DE TARJETAS === */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(5px);
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(245, 158, 11, 0.5);
        }

        .card-img-wrapper {
            position: relative;
            padding-top: 56.25%; /* Ratio 16:9 */
            overflow: hidden;
        }

        .card img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .card:hover img {
            transform: scale(1.08);
        }

        .duration-badge {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: bold;
            backdrop-filter: blur(4px);
        }

        .card-body {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-title {
            font-size: 1.2rem;
            margin: 0 0 10px 0;
            line-height: 1.4;
        }

        .card-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .btn-play {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--accent);
            color: #000;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.2s ease;
            width: 100%;

        .btn-play:hover {
            background: var(--accent-hover);

            background: rgba(245, 158, 11, 0.2);

            padding: 0 2px;

            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

    </style>

        const limpiarTexto = (texto) => {
            return texto.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        };

        // Función para resaltar resultados de forma segura (sin dañar HTML interno)
        const aplicarHighlight = (texto, palabras) => {
            if (!palabras.length) return texto;
            let resultado = texto;
            palabras.forEach(p => {
                const regex = new RegExp(`(${p})`, 'gi');
                resultado = resultado.replace(regex, '<span class="highlight">$1</span>');
            });
            return resultado;
        };

        const ejecutarBusqueda = () => {
            const queryRaw = DOM.input.value.trim();

            });

            renderizarPantalla(resultados, palabrasClave);

                DOM.grid.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                        <h2>Sin coincidencias</h2>
                        <p>Intenta buscar con otras palabras (ej: san valentín, ramón, robar).</p>
                    </div>`;
                return;
            }

            DOM.stats.innerHTML = `Mostrando <b>${datos.length}</b> de ${baseDeDatos.length} capítulos disponibles.`;

            // Generar tarjetas dinámicamente
            const fragmento = document.createDocumentFragment();
            
            datos.forEach(ep => {
                const tituloMostrado = aplicarHighlight(ep.title, palabrasClave);
                const descMostrada = aplicarHighlight(ep.description, palabrasClave);

                const div = document.createElement('article');
                div.className = 'card';
                div.innerHTML = `
                    <div class="card-img-wrapper">
                        <img src="${ep.image}" alt="Portada ${ep.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/350x197/1e293b/475569?text=Imagen+No+Disponible'">
                        <span class="duration-badge">⏱ ${ep.duration}</span>
                    </div>
                    <div class="card-body">
                        <h2 class="card-title">${tituloMostrado}</h2>
                        <p class="card-desc">${descMostrada}</p>
                        <a href="${ep.link}" target="_blank" rel="noopener noreferrer" class="btn-play">
                            ▶ Reproducir Capítulo
                        </a>
                    </div>
                `;
                fragmento.appendChild(div);
            });

            DOM.grid.appendChild(fragmento);
        };

        // Event Listeners
        DOM.input.addEventListener('input', ejecutarBusqueda);

        // Inicialización
        ejecutarBusqueda();
    </script>
</body>
</html>
