<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Portapapeles</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #121212; 
            color: #ffffff; 
            padding: 20px; 
            display: flex; 
            justify-content: center;
            margin: 0;
        }
        .container { 
            background-color: #1e1e1e; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.5); 
            width: 100%; 
            max-width: 400px; 
            border-left: 5px solid #00d2ff; 
        }
        h2 { color: #00d2ff; margin-top: 0; text-align: center; }
        textarea { 
            width: 100%; 
            height: 120px; 
            background-color: #2d2d2d; 
            color: #fff; 
            border: 1px solid #444; 
            border-radius: 8px; 
            padding: 10px; 
            margin-bottom: 15px; 
            resize: none; 
            box-sizing: border-box; 
            font-size: 16px;
        }
        button { 
            background-color: #00d2ff; 
            color: #000; 
            border: none; 
            padding: 14px; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            width: 100%; 
            margin-bottom: 12px; 
            font-size: 16px; 
            transition: 0.2s;
        }
        button:active { transform: scale(0.98); }
        button.load { background-color: #444; color: #fff; }
        #status { 
            margin-top: 10px; 
            font-size: 14px; 
            color: #aaaaaa; 
            text-align: center; 
            height: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>⚡ Mi Portapapeles</h2>
        <textarea id="textoCaja" placeholder="Pega tu enlace o texto aquí..."></textarea>
        
        <button onclick="guardarTexto()">📤 Guardar en la Nube</button>
        <button class="load" onclick="cargarTexto()">📥 Cargar Último Guardado</button>
        
        <div id="status">Listo para usar</div>
    </div>

    <script>
        // Tu URL de Google Apps Script
        const urlWebApp = "https://script.google.com/macros/s/AKfycbwP4sm2s-Py7vJ9y22UY9aymE81PyyexmlLgVV5HLvIqJS9q1X6e0JRolDltR14T-AT/exec";

        function guardarTexto() {
            const texto = document.getElementById('textoCaja').value;
            const status = document.getElementById('status');
            
            if(!texto.trim()) {
                status.innerText = "❌ La caja está vacía.";
                return;
            }
            
            status.innerText = "⏳ Guardando...";
            status.style.color = "#ffaa00";
            
            // Enviamos el texto a Google Sheets
            fetch(urlWebApp, {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: 'text=' + encodeURIComponent(texto)
            }).then(() => {
                status.innerText = "✅ ¡Guardado con éxito!";
                status.style.color = "#00ff00";
                document.getElementById('textoCaja').value = ''; // Limpia la caja tras guardar
            }).catch(err => {
                status.innerText = "❌ Ocurrió un error.";
                status.style.color = "#ff0000";
            });
        }

        function cargarTexto() {
            const status = document.getElementById('status');
            const caja = document.getElementById('textoCaja');
            
            status.innerText = "⏳ Buscando datos...";
            status.style.color = "#ffaa00";
            
            // Leemos el texto de Google Sheets
            fetch(urlWebApp)
            .then(response => response.text())
            .then(data => {
                caja.value = data;
                status.innerText = "✅ Texto recuperado.";
                status.style.color = "#00d2ff";
            }).catch(err => {
                status.innerText = "❌ Error al conectar.";
                status.style.color = "#ff0000";
            });
        }
    </script>

</body>
</html>
