<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Reader System</title>
  <style>
    :root {
      --bg-color: #121212;
      --surface-color: #1e1e1e;
      --primary-color: #007bff;
      --danger-color: #dc3545;
      --success-color: #28a745;
      --text-primary: #ffffff;
      --text-secondary: #b3b3b3;
      --border-radius: 12px;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-primary);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 700px;
    }

    h1 {
      text-align: center;
      font-weight: 600;
      margin-bottom: 24px;
      color: var(--text-primary);
    }

    h2 {
      font-weight: 500;
      margin-bottom: 15px;
      color: var(--text-primary);
      font-size: 20px;
      border-bottom: 1px solid #333;
      padding-bottom: 10px;
    }

    .input-section, .library-section {
      background-color: var(--surface-color);
      padding: 25px;
      border-radius: var(--border-radius);
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      margin-bottom: 30px;
    }

    textarea {
      width: 100%;
      height: 200px;
      background-color: #2d2d2d;
      color: var(--text-primary);
      border: 1px solid #404040;
      border-radius: 8px;
      padding: 15px;
      font-size: 16px;
      line-height: 1.5;
      resize: vertical;
      box-sizing: border-box;
      margin-bottom: 20px;
      outline: none;
      transition: border-color 0.3s;
    }

    textarea:focus {
      border-color: var(--primary-color);
    }

    .controls {
      display: flex;
      gap: 15px;
    }

    button {
      flex: 1;
      padding: 14px 20px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      color: white;
    }

    button:active {
      transform: scale(0.98);
    }

    .btn-play { background-color: var(--success-color); }
    .btn-play:hover { background-color: #218838; }
    
    .btn-stop { background-color: var(--danger-color); }
    .btn-stop:hover { background-color: #c82333; }

    .library-item {
      background-color: #2d2d2d;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border-left: 4px solid var(--primary-color);
    }

    .item-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .item-title {
      font-size: 16px;
      font-weight: 500;
      line-height: 1.4;
      margin-right: 15px;
    }

    .item-date {
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .item-actions {
      display: flex;
      gap: 10px;
      margin-top: 5px;
    }

    .btn-read {
      background-color: var(--primary-color);
      padding: 8px 15px;
      font-size: 14px;
      flex: 0 1 auto;
    }
    .btn-read:hover { background-color: #0056b3; }

    .btn-delete {
      background-color: transparent;
      border: 1px solid var(--danger-color);
      color: var(--danger-color);
      padding: 8px 15px;
      font-size: 14px;
      flex: 0 1 auto;
    }
    .btn-delete:hover {
      background-color: var(--danger-color);
      color: white;
    }

    #loading {
      text-align: center;
      color: var(--text-secondary);
      font-style: italic;
      padding: 20px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Voice Reader System</h1>
    
    <div class="input-section">
      <h2>Text Input</h2>
      <textarea id="textToRead" placeholder="Pega aquí el texto que deseas escuchar..."></textarea>
      
      <div class="controls">
        <button class="btn-play" onclick="saveAndRead()">Save & Read</button>
        <button class="btn-stop" onclick="stopAudio()">Stop Audio</button>
      </div>
    </div>

    <div class="library-section">
      <h2>Library</h2>
      <div id="libraryContainer">
        <div id="loading">Cargando tu base de datos...</div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwuIAodAhASSkFCjNOSLljy5L2LyH7JbjVzMCx2fQQHEUwwYQSho7HMGSWj1PLEXbHmtg/exec";
    let synth = window.speechSynthesis;

    window.onload = loadLibrary;

    function readText(text) {
      synth.cancel(); 
      let utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'es-ES'; 
      utterance.rate = 1.0; 
      synth.speak(utterance);
    }

    function stopAudio() {
      synth.cancel();
    }

    function saveAndRead() {
      const textInput = document.getElementById("textToRead").value;
      if (!textInput.trim()) {
        alert("Por favor, ingresa un texto primero.");
        return;
      }
      
      readText(textInput);

      const payload = {
        action: "save",
        text: textInput
      };

      fetch(API_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      }).then(() => {
        document.getElementById("textToRead").value = "";
        setTimeout(loadLibrary, 2000); 
      }).catch(e => console.error("Error al guardar:", e));
    }

    function deleteItem(id, buttonElement) {
      const payload = { action: "delete", id: id };
      
      stopAudio();
      
      const itemDiv = buttonElement.closest('.library-item');
      itemDiv.style.opacity = "0.4";
      itemDiv.style.pointerEvents = "none";

      fetch(API_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      }).then(() => {
        setTimeout(loadLibrary, 1500);
      }).catch(e => {
        console.error("Error al borrar:", e);
        itemDiv.style.opacity = "1";
        itemDiv.style.pointerEvents = "auto";
      });
    }

    async function loadLibrary() {
      const container = document.getElementById("libraryContainer");
      try {
        const response = await fetch(API_URL);
        const data = await response.json();
        container.innerHTML = "";
        
        if (!data || data.length === 0) {
          container.innerHTML = "<div id='loading'>No hay textos guardados en tu biblioteca.</div>";
          return;
        }
        
        data.reverse().forEach(item => {
          const div = document.createElement("div");
          div.className = "library-item";
          
          const safeText = item.text.replace(/'/g, "\\'").replace(/"/g, "&quot;").replace(/\n/g, " ");
          
          div.innerHTML = `
            <div class="item-header">
              <div class="item-title">${item.title}</div>
              <div class="item-date">${item.date}</div>
            </div>
            <div class="item-actions">
              <button class="btn-read" onclick="readText('${safeText}')">Read</button>
              <button class="btn-delete" onclick="deleteItem('${item.id}', this)">Delete</button>
            </div>
          `;
          
          container.appendChild(div);
        });
      } catch (e) {
        container.innerHTML = "<div id='loading'>Error al cargar la biblioteca. Revisa tu conexión.</div>";
        console.error(e);
      }
    }
  </script>
</body>
</html>
